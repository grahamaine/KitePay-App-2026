name: kitepay
description: KitePay Flutter app powered by Turnkey embedded wallets.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Turnkey — single package, bundles http + stamper transitively
  turnkey_sdk_flutter: ^1.2.1

  # State management  ← was missing; caused all provider URI / undefined errors
  provider: ^6.1.2

  cupertino_icons: ^1.0.8
  flutter_dotenv: ^6.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  # Create the directory before running:  mkdir -p assets/images
  assets:
    - assets/images/