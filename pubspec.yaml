name: kitepay
description: KitePay Flutter app powered by Turnkey embedded wallets.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_dotenv: ^6.0.1
  turnkey_sdk_flutter: ^1.2.1
  provider: ^6.1.2
  shared_preferences: ^2.3.2
  local_auth: ^2.3.0
  firebase_core: ^3.6.0
  firebase_crashlytics: ^4.1.3
  firebase_analytics: ^11.3.3
  reown_appkit: ^1.3.1
  web3dart: ^2.7.3
  http: ^1.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - .env