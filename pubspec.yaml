name: kitepay
description: KitePay Flutter app powered by embedded wallets.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_dotenv: ^6.0.1
  provider: ^6.1.2
  shared_preferences: ^2.3.2
  firebase_core: ^3.6.0
  firebase_auth: ^5.7.0
  firebase_crashlytics: ^4.1.3
  firebase_analytics: ^11.3.3
  http: ^1.2.2
  web3dart: ^2.7.3
  qr_flutter: ^4.1.0
  mobile_scanner: ^5.2.3
  crypto: ^3.0.3
  convert: ^3.1.1
  uuid: ^4.4.0
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - .env