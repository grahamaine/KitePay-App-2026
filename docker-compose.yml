services:
  kitepay-app:
    build: .
    ports:
      - "8080:8080"
    volumes:
      - .:/app
    # This prevents the container from overwriting your local .dart_tool
    # which can cause conflicts with your Windows VS Code setup
    command: >
      sh -c "flutter pub get && 
             flutter run -d web-server --web-port 8080 --web-hostname 0.0.0.0"