<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="KitePay — Fly further with every payment. A full-stack Web3 payment platform on Kite Chain." />
    <title>KitePay — Fly Further With Every Payment</title>
    <!-- OG / Social -->
    <meta property="og:title" content="KitePay — Fly Further With Every Payment" />
    <meta property="og:description" content="KitePay — Fly further with every payment. A full-stack Web3 payment platform on Kite Chain." />
    <meta property="og:image" content="/og-image.png" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="KitePay — Fly Further With Every Payment" />
    <meta name="twitter:description" content="KitePay — Fly further with every payment. A full-stack Web3 payment platform on Kite Chain." />
    <meta name="twitter:image" content="/og-image.png" />
  </head>
  <body>
    <div id="root"></div>
    <script>
      window.__kitepay_err = function(msg, src, line, col, err) {
        var el = document.getElementById('root');
        el.style.cssText = 'display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;background:#0B0F1E;color:#fff;font-family:monospace;padding:2rem;gap:1rem';
        el.innerHTML = '<h2 style="color:#EF4444;margin:0">Load error</h2><pre style="background:#111827;padding:1rem;border-radius:8px;max-width:90vw;overflow:auto;font-size:12px;color:#fca5a5;white-space:pre-wrap;word-break:break-word">' + (err ? err.stack || err.message : msg) + '</pre>';
      };
      window.onerror = window.__kitepay_err;
      window.addEventListener('unhandledrejection', function(e) {
        window.__kitepay_err(String(e.reason), '', 0, 0, e.reason instanceof Error ? e.reason : new Error(String(e.reason)));
      });
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
